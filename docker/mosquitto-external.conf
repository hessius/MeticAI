# ==============================================================================
# MeticAI Mosquitto MQTT Broker Configuration (External Access)
# ==============================================================================
# Used when Home Assistant or other external MQTT clients need to connect.
# Binds to all interfaces so the published port is reachable from the host.
# ==============================================================================

# Listen on all interfaces (required for Docker port publishing)
listener 1883 0.0.0.0

# No authentication required (local network only)
allow_anonymous true

# No persistence needed (bridge republishes state on reconnect)
persistence false

# Logging to stderr for s6-overlay capture
log_dest stderr
log_type error
log_type warning
