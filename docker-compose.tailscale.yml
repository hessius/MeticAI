# ==============================================================================
# MeticAI Tailscale Sidecar
# ==============================================================================
# Adds Tailscale VPN for secure remote access.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.tailscale.yml up -d
#
# Prerequisites:
#   - TAILSCALE_AUTHKEY set in .env
#   - Get auth key from: https://login.tailscale.com/admin/settings/keys
# ==============================================================================

services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: meticai-tailscale
    restart: unless-stopped
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    environment:
      - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_USERSPACE=true
      - TS_HOSTNAME=meticai
      - TS_SERVE_CONFIG=/config/serve.json
      - TS_SOCKET=/var/run/tailscale/tailscaled.sock
    volumes:
      - tailscale-state:/var/lib/tailscale
      - tailscale-sock:/var/run/tailscale
      - ./tailscale-serve.json:/config/serve.json:ro
    network_mode: service:meticai
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
    # tailscale joins meticai's network namespace via network_mode,
    # so Docker Compose automatically starts meticai first — no
    # additional depends_on is needed (and adding one would cause a cycle).

  # Overlay: mount Tailscale socket into the main container
  meticai:
    volumes:
      - tailscale-sock:/var/run/tailscale:ro

volumes:
  tailscale-state:
    name: meticai-tailscale-state
  tailscale-sock:
    name: meticai-tailscale-sock
