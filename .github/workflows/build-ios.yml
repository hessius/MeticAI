name: Build iOS App

on:
  push:
    branches: [main]
    paths:
      - 'apps/web/**'
      - 'VERSION'
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-ios:
    name: Build Capacitor iOS
    runs-on: macos-15
    defaults:
      run:
        working-directory: apps/web

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Bun (attempt 1)
        id: setup_bun_1
        continue-on-error: true
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Bun (attempt 2)
        id: setup_bun_2
        if: steps.setup_bun_1.outcome == 'failure'
        continue-on-error: true
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Setup Bun (attempt 3)
        if: steps.setup_bun_2.outcome == 'failure'
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.10

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build web app for Capacitor
        run: VITE_MACHINE_MODE=capacitor bun run build

      - name: Sync Capacitor
        run: npx cap sync ios

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.3.app

      - name: Build iOS (no code signing)
        run: |
          xcodebuild build \
            -project ios/App/App.xcodeproj \
            -scheme App \
            -destination 'generic/platform=iOS Simulator' \
            -configuration Release \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            | tail -20

      - name: Report build result
        if: always()
        run: |
          if [ -d ios/App/build ]; then
            SIZE=$(du -sh ios/App/build/ | cut -f1)
            echo "📱 iOS build: ${SIZE}"
          else
            echo "📱 iOS build completed (simulator target)"
          fi
